name: identity
on:
  push:
    branches: [ main ]
permissions:
  contents: read
jobs:
  identity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Actor/Ref assertion
        shell: bash
        run: |
          set -euo pipefail
          echo "actor=${GITHUB_ACTOR}"
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
