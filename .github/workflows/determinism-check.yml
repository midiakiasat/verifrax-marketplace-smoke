name: Determinism Check
on:
  push:
    branches: [ main ]
permissions:
  contents: read
jobs:
  determinism:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Hard clean
        shell: bash
        run: |
          set -euo pipefail
          git reset --hard
          git clean -ffd
      - name: Verify clean workspace
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(git status --porcelain=v1)"
          git diff --exit-code
          git submodule status || true
      - name: Determinism marker
        shell: bash
        run: |
          set -euo pipefail
          echo "determinism: ok"
